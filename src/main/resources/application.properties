spring.application.name=habitsApi

# PostgreSQL Configuration (Production-ready)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

spring.jpa.properties.jakarta.persistence.query.timeout=5000
spring.jpa.properties.hibernate.query.timeout=5000

spring.datasource.hikari.connection-timeout=10000

# Flyway Configuration
# CRITICAL: baseline-on-migrate=true is required for existing databases with data
# This prevents Flyway from trying to recreate existing tables
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

server.port=8080

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${baseUrl}/login/oauth2/code/{registrationId}


# Frontend Configuration (Production-ready)
app.frontend.url=${FRONTEND_URL}

server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Redis Configuration
# Used for distributed rate limiting with Bucket4j
# The actual rate limiting logic is implemented programmatically in RateLimitConfig.java
# - Authenticated users: 100 req/min (keyed by userId)
# - Anonymous users: 20 req/min (keyed by IP from X-Forwarded-For)
spring.data.redis.url=${REDIS_URL}
