spring.application.name=habitsApi

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests (H2 uses Hibernate create-drop)
spring.flyway.enabled=false

# OAuth2 Configuration (mock values for testing)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email

# Frontend Configuration (mock value for testing)
app.frontend.url=http://localhost:3000

# Redis Configuration (mock value for testing - not actually used in tests)
REDIS_URL=redis://localhost:6379

# Woovi/OpenPix Configuration (mock values for testing)
woovi.app-id=test-app-id
woovi.api-url=https://api.openpix.com.br
woovi.webhook-secret=test-webhook-secret
