spring.application.name=habitsApi

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/habitsdb
spring.datasource.username=habitsuser
spring.datasource.password=habitspass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# OAuth2 Google Configuration
# Get your credentials from: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend Configuration
# URL of the frontend application (used for CORS and post-login redirect)
app.frontend.url=http://localhost:5173
