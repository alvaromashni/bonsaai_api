spring.application.name=habitsApi

# PostgreSQL Configuration (Production-ready)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/habitsdb}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

spring.jpa.properties.jakarta.persistence.query.timeout=5000
spring.jpa.properties.hibernate.query.timeout=5000

spring.datasource.hikari.connection-timeout=10000

server.port=8080

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}


# Frontend Configuration (Production-ready)
app.frontend.url=${FRONTEND_URL}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
